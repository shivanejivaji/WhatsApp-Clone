<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00a884">
    <title>WhatsApp Clone — Login</title>
    <link rel="shortcut icon" href="https://img.icons8.com/fluency/48/000000/whatsapp.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --green-deep: #075e54;
            --green-mid: #128c7e;
            --green-light: #25d366;
            --green-accent: #00a884;
            --bg-dark: #0a0f0d;
            --bg-card: #111917;
            --bg-input: #1a2520;
            --text-primary: #e8f5f2;
            --text-muted: #7a9e97;
            --border: #1e3330;
            --glow: rgba(37, 211, 102, 0.15);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            color: var(--text-primary);
        }

        /* ── Animated mesh background ── */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-mesh::before {
            content: '';
            position: absolute;
            width: 700px;
            height: 700px;
            top: -200px;
            left: -200px;
            background: radial-gradient(circle, rgba(18, 140, 126, 0.22) 0%, transparent 70%);
            animation: drift1 18s ease-in-out infinite alternate;
        }

        .bg-mesh::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            bottom: -150px;
            right: -150px;
            background: radial-gradient(circle, rgba(37, 211, 102, 0.12) 0%, transparent 70%);
            animation: drift2 22s ease-in-out infinite alternate;
        }

        @keyframes drift1 {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(80px, 60px) scale(1.1);
            }
        }

        @keyframes drift2 {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(-60px, -80px) scale(1.15);
            }
        }

        /* subtle grid overlay */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(37, 211, 102, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(37, 211, 102, 0.03) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        /* ── Main layout ── */
        .page-wrap {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        /* ── Card ── */
        .card {
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 48px 44px;
            position: relative;
            overflow: hidden;
            animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
            box-shadow:
                0 0 0 1px rgba(37, 211, 102, 0.06),
                0 32px 64px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        /* top edge glow */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--green-accent), transparent);
        }

        /* corner accent */
        .card::after {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(37, 211, 102, 0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(32px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ── Icon badge ── */
        .icon-badge {
            width: 72px;
            height: 72px;
            border-radius: 22px;
            background: linear-gradient(135deg, var(--green-deep), var(--green-mid));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            box-shadow: 0 8px 32px rgba(37, 211, 102, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.15);
            position: relative;
            animation: badgePop 0.6s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .icon-badge i {
            font-size: 32px;
            color: #fff;
        }

        @keyframes badgePop {
            from {
                opacity: 0;
                transform: scale(0.6);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* pulse ring */
        .icon-badge::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 28px;
            border: 1.5px solid rgba(37, 211, 102, 0.25);
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.4;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        /* ── Header text ── */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(22px, 4vw, 26px);
            color: var(--text-primary);
            letter-spacing: -0.5px;
            animation: fadeUp 0.5s 0.4s ease both;
        }

        .header .subtitle {
            font-size: 13.5px;
            color: var(--text-muted);
            margin-top: 6px;
            font-weight: 300;
            letter-spacing: 0.2px;
            animation: fadeUp 0.5s 0.5s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Live badge ── */
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(37, 211, 102, 0.08);
            border: 1px solid rgba(37, 211, 102, 0.2);
            border-radius: 100px;
            padding: 3px 10px;
            font-size: 11px;
            color: var(--green-light);
            font-weight: 500;
            letter-spacing: 0.4px;
            margin-top: 10px;
            animation: fadeUp 0.5s 0.6s ease both;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green-light);
            animation: blink 1.4s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* ── Form fields ── */
        .field {
            margin-bottom: 20px;
            animation: fadeUp 0.5s ease both;
        }

        .field:nth-child(1) {
            animation-delay: 0.55s;
        }

        .field:nth-child(2) {
            animation-delay: 0.65s;
        }

        .field label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .field label i {
            font-size: 11px;
            color: var(--green-accent);
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap input {
            width: 100%;
            background: var(--bg-input);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 15px 18px 15px 48px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 400;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
            caret-color: var(--green-light);
        }

        .input-wrap input::placeholder {
            color: #3a5450;
        }

        .input-wrap input:focus {
            border-color: rgba(37, 211, 102, 0.4);
            background: #1e2e2a;
            box-shadow: 0 0 0 4px rgba(37, 211, 102, 0.07);
        }

        .input-icon {
            position: absolute;
            left: 17px;
            top: 50%;
            transform: translateY(-50%);
            color: #2e4e49;
            font-size: 14px;
            transition: color 0.25s;
            pointer-events: none;
        }

        .input-wrap:focus-within .input-icon {
            color: var(--green-accent);
        }

        /* character count chip */
        .char-count {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            color: #2e4e49;
            font-weight: 500;
            transition: color 0.25s;
            pointer-events: none;
        }

        .input-wrap:focus-within .char-count {
            color: var(--text-muted);
        }

        /* ── Submit button ── */
        .btn-join {
            width: 100%;
            margin-top: 8px;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--green-mid) 0%, var(--green-light) 100%);
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 24px rgba(37, 211, 102, 0.3);
            animation: fadeUp 0.5s 0.75s ease both;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-join::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), transparent);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .btn-join:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 32px rgba(37, 211, 102, 0.4);
        }

        .btn-join:hover::before {
            opacity: 1;
        }

        .btn-join:active {
            transform: translateY(0);
        }

        .btn-join .btn-icon {
            width: 28px;
            height: 28px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }

        /* Ripple */
        .btn-join .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 28px 0 0;
            animation: fadeUp 0.5s 0.8s ease both;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-size: 11px;
            color: #2e4e49;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* ── Security row ── */
        .security-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 18px;
            animation: fadeUp 0.5s 0.85s ease both;
        }

        .sec-chip {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: #3a5450;
            font-weight: 400;
        }

        .sec-chip i {
            font-size: 10px;
            color: var(--green-deep);
        }

        /* ── Footer ── */
        footer {
            position: relative;
            z-index: 1;
            border-top: 1px solid var(--border);
            padding: 14px 24px;
            text-align: center;
            font-size: 12px;
            color: #2e4e49;
            letter-spacing: 0.3px;
            background: rgba(10, 15, 13, 0.8);
            backdrop-filter: blur(8px);
        }

        footer strong {
            color: var(--green-accent);
            font-weight: 600;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .card {
                padding: 36px 24px;
                border-radius: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>

    <main class="page-wrap">
        <div class="card">

            <!-- Icon -->
            <div class="icon-badge">
                <i class="fab fa-whatsapp"></i>
            </div>

            <!-- Header -->
            <div class="header">
                <h1>WhatsApp Clone</h1>
                <p class="subtitle">Connect with friends and family instantly</p>
                <div>
                    <span class="live-badge">
                        <span class="live-dot"></span>
                        Servers online
                    </span>
                </div>
            </div>

            <!-- Form -->
            <form id="login-form">

                <div class="field">
                    <label for="username">
                        <i class="fas fa-user"></i>
                        Username
                    </label>
                    <div class="input-wrap">
                        <i class="fas fa-at input-icon"></i>
                        <input type="text" id="username" placeholder="your_handle" required minlength="3" maxlength="24"
                            autocomplete="off" spellcheck="false">
                        <span class="char-count" id="username-count">0/24</span>
                    </div>
                </div>

                <div class="field">
                    <label for="room">
                        <i class="fas fa-hashtag"></i>
                        Room
                    </label>
                    <div class="input-wrap">
                        <i class="fas fa-door-open input-icon"></i>
                        <input type="text" id="room" placeholder="general" value="general" required maxlength="32"
                            autocomplete="off" spellcheck="false">
                        <span class="char-count" id="room-count">7/32</span>
                    </div>
                </div>

                <button type="submit" class="btn-join" id="join-btn">
                    <span class="btn-icon"><i class="fas fa-arrow-right"></i></span>
                    Join Chat
                </button>

                <div class="divider"><span>SECURED BY</span></div>

                <div class="security-row">
                    <span class="sec-chip"><i class="fas fa-shield-halved"></i> End-to-end</span>
                    <span class="sec-chip"><i class="fas fa-lock"></i> Encrypted</span>
                    <span class="sec-chip"><i class="fas fa-eye-slash"></i> Private</span>
                </div>

            </form>
        </div>
    </main>

    <footer>
        © 2026 <strong>WhatsApp Clone</strong> &nbsp;·&nbsp; Built for learning &nbsp;·&nbsp; Jivaji Shivane
        &nbsp;·&nbsp; v1.0
    </footer>

    <!-- Char counters + ripple + optional redirect -->
    <script>
        // ── Character counters ──
        function initCounter(inputId, countId, max) {
            const input = document.getElementById(inputId);
            const counter = document.getElementById(countId);
            if (!input || !counter) return;
            const update = () => counter.textContent = `${input.value.length}/${max}`;
            input.addEventListener('input', update);
            update();
        }
        initCounter('username', 'username-count', 24);
        initCounter('room', 'room-count', 32);

        // ── Ripple on button ──
        document.getElementById('join-btn').addEventListener('click', function (e) {
            const btn = this;
            const circle = document.createElement('span');
            const d = Math.max(btn.clientWidth, btn.clientHeight);
            const r = btn.getBoundingClientRect();
            circle.classList.add('ripple');
            circle.style.cssText = `width:${d}px;height:${d}px;left:${e.clientX - r.left - d / 2}px;top:${e.clientY - r.top - d / 2}px`;
            btn.appendChild(circle);
            circle.addEventListener('animationend', () => circle.remove());
        });

        // ── Form submit (wire to your script.js as needed) ──
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const room = document.getElementById('room').value.trim();
            if (!username || username.length < 3) {
                document.getElementById('username').focus();
                return;
            }
            // Replace below with your actual navigation / socket logic
            console.log('Joining as:', username, '| Room:', room);
            // window.location.href = `chat.html?user=${encodeURIComponent(username)}&room=${encodeURIComponent(room)}`;
        });
    </script>

    <!-- Your original script -->
    <script src="script.js"></script>
</body>

</html>
